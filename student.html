<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Login | SecureBeacon</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root {
            --bg: #0f1115;
            --card: #1c1f26;
            --primary: #3b82f6;
            --text: #f0f0f5;
            --muted: #94a3b8;
            --success: #10b981;
            --error: #ef4444;
        }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--text); display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; text-align: center; }
        .container { background-color: var(--card); padding: 2.5rem; border-radius: 1.5rem; border: 1px solid rgba(255, 255, 255, 0.08); max-width: 400px; width: 90%; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3); }
        h2 { margin-top: 0; color: var(--primary); font-size: 1.75rem; }
        p { color: var(--muted); margin-bottom: 2rem; font-size: 0.95rem; line-height: 1.5; }
        
        .input-group { text-align: left; margin-bottom: 1.25rem; }
        label { display: block; margin-bottom: 0.5rem; font-size: 0.85rem; color: var(--muted); font-weight: 500; }
        input { width: 100%; padding: 0.85rem; border-radius: 0.75rem; background: var(--bg); color: white; border: 1px solid rgba(255,255,255,0.1); box-sizing: border-box; font-size: 1rem; transition: border 0.3s; }
        input:focus { outline: none; border-color: var(--primary); }

        .btn { background-color: var(--primary); color: white; border: none; padding: 1rem; font-size: 1rem; border-radius: 0.75rem; cursor: pointer; font-weight: 600; transition: all 0.3s ease; width: 100%; margin-top: 0.5rem; }
        .btn:hover { background-color: #2563eb; transform: translateY(-2px); }
        .btn:disabled { background-color: #475569; cursor: not-allowed; transform: none; }
        
        #attendance-zone { display: none; }
        #status { margin-top: 1.5rem; font-weight: 600; padding: 1rem; border-radius: 0.5rem; }
        .success { color: var(--success); background: rgba(16, 185, 129, 0.1); }
        .error { color: var(--error); background: rgba(239, 68, 68, 0.1); }
        .scanning { color: #f59e0b; background: rgba(245, 158, 11, 0.1); }
        #debug { margin-top: 1rem; font-size: 0.75rem; color: #64748b; font-family: monospace; }
        .user-chip { background: rgba(59, 130, 246, 0.1); color: var(--primary); padding: 0.5rem 1rem; border-radius: 2rem; display: inline-block; margin-bottom: 1.5rem; font-weight: 600; font-size: 0.9rem; }
    </style>
</head>
<body>
    <div class="container">
        <!-- Login Section -->
        <div id="login-zone">
            <h2>Student Login</h2>
            <p>Enter your credentials to access Software Engineering attendance.</p>
            <div class="input-group">
                <label>Roll Number (USN)</label>
                <input type="text" id="usnInput" placeholder="e.g. 1NC25MC001">
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" id="passInput" placeholder="Default: 123456">
            </div>
            <button id="loginBtn" class="btn">Login</button>
        </div>

        <!-- Attendance Section (Hidden until login) -->
        <div id="attendance-zone">
            <h2>Verify Presence</h2>
            <div id="userInfo" class="user-chip"></div>
            <p>Ready to listen for the professor's signal. Please ensure your volume is up.</p>
            <button id="listenBtn" class="btn">Listen for Signal</button>
        </div>

        <div id="status"></div>
        <div id="debug"></div>
    </div>

    <script>
        const socket = io();
        
        // Mock DB with USNs and Names (Passwords are all 123456 for now)
        const studentDb = [
            { id: "1NC25MC001", name: "ABHISHEK H N" }, { id: "1NC25MC002", name: "ADITHYA GOWDA N A" },
            { id: "1NC25MC003", name: "BHUVANESHWARI M" }, { id: "1NC25MC004", name: "CHARANA SHREE R" },
            { id: "1NC25MC005", name: "DEEKSHA L D" }, { id: "1NC25MC006", name: "DEEPAK H S" },
            { id: "1NC25MC007", name: "GANGOTHRI G" }, { id: "1NC25MC008", name: "HARI N B" },
            { id: "1NC25MC009", name: "HARSHITH GOWDA" }, { id: "1NC25MC010", name: "HUSSIAN M K" },
            { id: "1NC25MC011", name: "KARTHIK M" }, { id: "1NC25MC012", name: "KUBRA TAJ R A" },
            { id: "1NC25MC013", name: "LIKHITH KUMAR D" }, { id: "1NC25MC014", name: "MANJUNATHA S" },
            { id: "1NC25MC015", name: "MAZEENAKHTAR MAHAMMADIBRAHIM CHUHE" }, { id: "1NC25MC016", name: "PRIYANKA C" },
            { id: "1NC25MC017", name: "PRIYANKA GOPAL GADIVADDAR" }, { id: "1NC25MC018", name: "RAKSHITHA C S" },
            { id: "1NC25MC019", name: "RASHEED B" }, { id: "1NC25MC020", name: "SHRAVANI D R" },
            { id: "1NC25MC021", name: "SHRAVANI K N" }, { id: "1NC25MC022", name: "SHRAVANI M" },
            { id: "1NC25MC023", name: "SOWJANYA N" }, { id: "1NC25MC024", name: "V N KEERTHANA" },
            { id: "1NC25MC025", name: "VARSHA K P" }, { id: "1NC25MC026", name: "VIDHYA R" },
            { id: "1NC25MC027", name: "VIJET TADASAD" }, { id: "1NC25MC028", name: "YESHWANTH M N" }
        ];

        let currentUser = null;
        const TARGET_FREQUENCY = 18500;
        const TOLERANCE = 500;
        let audioCtx, analyser, microphone, scriptNode;

        // Login Logic
        document.getElementById('loginBtn').onclick = () => {
            const usn = document.getElementById('usnInput').value.trim().toUpperCase();
            const pass = document.getElementById('passInput').value;
            const status = document.getElementById('status');

            const student = studentDb.find(s => s.id === usn);
            
            if (student && pass === "123456") {
                currentUser = student;
                document.getElementById('login-zone').style.display = 'none';
                document.getElementById('attendance-zone').style.display = 'block';
                document.getElementById('userInfo').textContent = `Logged in: ${student.name}`;
                status.textContent = "";
                status.className = "";
            } else {
                status.textContent = "Invalid USN or Password!";
                status.className = "error";
            }
        };

        // Attendance Verification Logic
        const listenBtn = document.getElementById('listenBtn');
        const statusEl = document.getElementById('status');
        const debugEl = document.getElementById('debug');

        listenBtn.addEventListener('click', async () => {
            listenBtn.disabled = true;
            statusEl.textContent = "Listening for Professor's signal...";
            statusEl.className = 'scanning';

            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    audio: { echoCancellation: false, noiseSuppression: false, autoGainControl: false }, 
                    video: false 
                });
                
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                analyser = audioCtx.createAnalyser();
                analyser.fftSize = 2048;
                microphone = audioCtx.createMediaStreamSource(stream);
                scriptNode = audioCtx.createScriptProcessor(2048, 1, 1);
                
                microphone.connect(analyser);
                analyser.connect(scriptNode);
                scriptNode.connect(audioCtx.destination);
                
                scriptNode.onaudioprocess = function() {
                    const dataArray = new Uint8Array(analyser.frequencyBinCount);
                    analyser.getByteFrequencyData(dataArray);
                    
                    let maxVal = 0, maxIndex = 0;
                    for(let i = Math.floor(dataArray.length/2); i < dataArray.length; i++) {
                        if(dataArray[i] > maxVal) { maxVal = dataArray[i]; maxIndex = i; }
                    }
                    
                    const freq = Math.round((maxIndex * (audioCtx.sampleRate/2)) / dataArray.length);
                    if (maxVal > 10) debugEl.textContent = `Freq: ${freq} Hz | Vol: ${maxVal}`;
                    
                    if(Math.abs(freq - TARGET_FREQUENCY) < TOLERANCE && maxVal > 50) {
                        scriptNode.disconnect(); microphone.disconnect(); analyser.disconnect(); audioCtx.close();
                        statusEl.textContent = "Signal verified! Syncing...";
                        socket.emit('student_attendance', currentUser);
                    }
                };
            } catch (err) {
                statusEl.textContent = "Mic access denied!";
                statusEl.className = 'error';
                listenBtn.disabled = false;
            }
        });

        socket.on('attendance_success', () => {
            statusEl.textContent = "Attendance Marked! ✅";
            statusEl.className = "success";
            listenBtn.textContent = "Success";
            
            // Allow logging out/switching only after success for testing
            const logout = document.createElement('button');
            logout.className = 'btn';
            logout.style.background = '#4b5563';
            logout.style.marginTop = '1rem';
            logout.textContent = "Logout / Next Student";
            logout.onclick = () => location.reload();
            document.querySelector('.container').appendChild(logout);
        });

        socket.on('attendance_rejected', (msg) => {
            statusEl.textContent = msg;
            statusEl.className = "error";
            listenBtn.disabled = false;
        });
    </script>
</body>
</html>
